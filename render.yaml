# render.yaml - ملف إعدادات Render
services:
  - type: web
    name: telegram-members-bot
    runtime: python
    repo: https://github.com/kingali371/telegram-members-bot
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    healthCheckPath: /health
    envVars:
      - key: API_ID
        sync: false
        required: true
      - key: API_HASH
        sync: false
        required: true
      - key: BOT_TOKEN
        sync: false
        required: true
      - key: OWNER_ID
        sync: false
        required: true
      - key: MIN_WAIT
        value: "180"
      - key: MAX_WAIT
        value: "300"
      - key: MAX_ADD_PER_DAY
        value: "20"
